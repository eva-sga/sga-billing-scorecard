name: Refresh Billing Data

on:
  schedule:
    - cron: "0,30 * * * *"   # every 30 minutes
  workflow_dispatch:           # also allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data from Jira + Airtable
        env:
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}
          AIRTABLE_TOKEN:  ${{ secrets.AIRTABLE_TOKEN }}
        run: python scripts/fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "SGA Bot"
          git config user.email "bot@soundsgood.agency"
          git add data.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: refresh billing data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
